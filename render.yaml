services:
  - type: web
    name: adsage-backend
    env: python
    buildCommand: "cd backend && pip install -r requirements.txt"
    startCommand: "cd backend && uvicorn app.main:app --host 0.0.0.0 --port $PORT --proxy-headers"
    envVars:
      - key: DATABASE_URL
        value: sqlite:///./meta_ads_agent.db
